<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rooms — Another House</title>
    <meta name="description" content="Explore Another House rooms: romantic, sky, cinema, nature, minimal." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400;9..40,500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />

    <script src="assets/js/tailwind-theme.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:      #F4EFE6;
      --parchment:  #EDE5D8;
      --ink:        #191614;
      --ink60:      rgba(25,22,20,.6);
      --ink30:      rgba(25,22,20,.3);
      --ink10:      rgba(25,22,20,.1);
      --gold:       #C4944A;
      --olive:      #5A6545;
      --white:      #FDFAF6;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 999; pointer-events: none;
      opacity: .025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    .container { max-width: 1280px; margin: 0 auto; padding: 0 40px; }
    @media (max-width: 767px) { .container { padding: 0 20px; } }

    .gold-line {
      display: inline-block; width: 32px; height: 1px;
      background: var(--gold); vertical-align: middle; margin-right: 12px;
    }
    .f-display { font-family: 'Cormorant Garamond', serif; font-weight: 300; line-height: 1.0; }
    .f-label { font-size: 10px; letter-spacing: .18em; text-transform: uppercase; font-weight: 400; }

    /* ── HEADER ── */
    .site-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 0 40px; height: 72px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(244,239,230,.85);
      backdrop-filter: blur(20px) saturate(160%);
      border-bottom: 1px solid var(--ink10);
    }
    @media (max-width: 767px) { .site-header { padding: 0 20px; } }

    .header-brand {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none; color: var(--ink);
    }
    .header-brand-mark {
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--ink);
      display: flex; align-items: center; justify-content: center;
    }
    .header-brand-mark span {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px; color: var(--cream); letter-spacing: .05em;
    }
    .header-brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px; font-weight: 400; letter-spacing: .04em;
    }
    .header-nav { display: flex; align-items: center; gap: 2px; }
    .header-nav a {
      padding: 6px 14px;
      font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
      color: var(--ink60); text-decoration: none; transition: color .2s;
    }
    .header-nav a:hover, .header-nav a.active { color: var(--ink); }
    .header-cta {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 20px;
      font-size: 11px; letter-spacing: .14em; text-transform: uppercase; font-weight: 500;
      color: var(--cream); background: var(--ink);
      text-decoration: none; border-radius: 2px;
      transition: background .3s;
    }
    .header-cta:hover { background: var(--olive); }
    @media (max-width: 767px) { .header-nav { display: none; } }

    /* ── PAGE HERO ── */
    .page-hero {
      padding-top: 72px;
      position: relative;
      overflow: hidden;
    }

    .page-hero-bg {
      position: absolute; inset: 0;
      background: var(--ink);
    }
    .page-hero-bg-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover;
      opacity: .25;
    }
    .page-hero-bg-gradient {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 30%, var(--cream) 100%);
    }

    .page-hero-inner {
      position: relative; z-index: 2;
      padding: 80px 40px 64px;
      max-width: 1280px; margin: 0 auto;
    }
    @media (max-width: 767px) { .page-hero-inner { padding: 60px 20px 48px; } }

    .page-hero-label {
      display: flex; align-items: center; margin-bottom: 20px;
    }
    .page-hero-label span { font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: var(--gold); }

    .page-hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(56px, 8vw, 110px);
      font-weight: 300; line-height: .92;
      letter-spacing: -.02em;
      color: var(--cream);
    }
    .page-hero-title em { font-style: italic; color: var(--gold); }

    .page-hero-bottom {
      display: flex; align-items: flex-end; justify-content: space-between;
      gap: 24px; flex-wrap: wrap;
      margin-top: 40px;
    }

    .page-hero-desc {
      font-size: 15px; color: rgba(244,239,230,.6);
      line-height: 1.75; max-width: 440px;
    }

    .page-hero-book {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 13px 28px;
      font-size: 11px; letter-spacing: .15em; text-transform: uppercase; font-weight: 500;
      color: var(--cream); background: transparent;
      border: 1px solid rgba(244,239,230,.3);
      text-decoration: none; border-radius: 2px;
      white-space: nowrap;
      transition: background .3s, border-color .3s;
    }
    .page-hero-book:hover { background: var(--gold); border-color: var(--gold); }

    /* ── FILTERS ── */
    .filters-bar {
      position: sticky;
      top: 68px; /* match fixed header height so there is no visible gap */
      z-index: 50;
      background: rgba(244,239,230,.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--ink10);
    }

    .filters-inner {
      max-width: 1280px; margin: 0 auto;
      padding: 0 40px;
      height: 60px;
      display: flex; align-items: center;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filters-inner::-webkit-scrollbar { display: none; }
    @media (max-width: 767px) { .filters-inner { padding: 0 20px; } }

    .filter-btn {
      flex-shrink: 0;
      padding: 8px 18px;
      font-size: 11px; letter-spacing: .13em; text-transform: uppercase; font-weight: 400;
      color: var(--ink60);
      background: transparent; border: none; cursor: pointer;
      position: relative;
      transition: color .25s;
    }
    .filter-btn::after {
      content: '';
      position: absolute; bottom: 0; left: 18px; right: 18px;
      height: 1px; background: var(--gold);
      transform: scaleX(0); transform-origin: left;
      transition: transform .3s ease;
    }
    .filter-btn:hover { color: var(--ink); }
    .filter-btn.active { color: var(--ink); font-weight: 500; }
    .filter-btn.active::after { transform: scaleX(1); }

    .filters-count {
      margin-left: auto;
      flex-shrink: 0;
      padding-left: 24px;
      font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
      color: var(--ink30);
      white-space: nowrap;
    }

    /* ── ROOMS ── */
    .rooms-section { padding: 64px 0 120px; }

    /* View toggle */
    .view-controls {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 40px; flex-wrap: wrap; gap: 16px;
    }

    .view-label {
      font-size: 12px; letter-spacing: .12em; text-transform: uppercase;
      color: var(--ink30);
    }

    .view-toggle {
      display: flex; gap: 4px;
    }
    .view-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: 1px solid var(--ink10);
      border-radius: 2px; cursor: pointer;
      color: var(--ink30);
      transition: color .2s, border-color .2s, background .2s;
    }
    .view-btn.active, .view-btn:hover {
      color: var(--ink); border-color: var(--ink30);
      background: var(--white);
    }

    /* ── GRID VIEW ── */
    #roomsGrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
    }
    @media (max-width: 1024px) { #roomsGrid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 600px)  { #roomsGrid { grid-template-columns: 1fr; } }

    .room-grid-card {
      position: relative; overflow: hidden;
      aspect-ratio: 2/3;
      background: var(--ink);
      text-decoration: none; color: var(--cream);
      display: block;
    }

    .room-grid-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover;
      opacity: .7;
      transition: opacity .5s, transform .8s ease;
    }
    .room-grid-card:hover .room-grid-img { opacity: .5; transform: scale(1.05); }

    .room-grid-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(25,22,20,.9) 0%, rgba(25,22,20,.1) 55%);
    }

    .room-grid-body {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 28px;
    }

    .room-grid-num {
      font-size: 10px; letter-spacing: .2em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 6px;
    }
    .room-grid-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 30px; font-weight: 300; line-height: 1;
    }
    .room-grid-price {
      margin-top: 10px;
      font-size: 12px; color: rgba(244,239,230,.55); letter-spacing: .08em;
    }
    .room-grid-price strong {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; font-weight: 300; color: var(--cream);
    }
    .room-grid-tags {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-top: 12px;
      max-height: 0; overflow: hidden;
      transition: max-height .4s ease, opacity .3s;
      opacity: 0;
    }
    .room-grid-card:hover .room-grid-tags { max-height: 60px; opacity: 1; }
    .room-grid-tag {
      padding: 3px 10px;
      font-size: 9px; letter-spacing: .12em; text-transform: uppercase;
      border: 1px solid rgba(244,239,230,.25);
      border-radius: 1px;
      color: rgba(244,239,230,.6);
    }
    .room-grid-cta {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 14px;
      padding: 9px 18px;
      font-size: 10px; letter-spacing: .15em; text-transform: uppercase; font-weight: 500;
      background: var(--gold); color: var(--cream);
      border-radius: 2px;
      opacity: 0;
      transition: opacity .3s .1s;
    }
    .room-grid-card:hover .room-grid-cta { opacity: 1; }

    /* ── LIST VIEW ── */
    #roomsList { display: none; flex-direction: column; gap: 2px; }
    #roomsList.active { display: flex; }
    #roomsGrid.hidden { display: none; }

    .room-list-card {
      display: grid;
      grid-template-columns: 340px 1fr;
      background: var(--white);
      text-decoration: none; color: var(--ink);
      border: 1px solid var(--ink10);
      overflow: hidden;
      transition: border-color .3s, box-shadow .3s;
    }
    .room-list-card:hover {
      border-color: var(--gold);
      box-shadow: 0 0 0 1px var(--gold);
    }
    @media (max-width: 900px) {
      .room-list-card { grid-template-columns: 1fr; }
    }

    .room-list-img-wrap {
      position: relative; overflow: hidden;
      aspect-ratio: 4/3;
    }
    .room-list-img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform .7s ease;
    }
    .room-list-card:hover .room-list-img { transform: scale(1.04); }

    .room-list-num-badge {
      position: absolute; top: 20px; left: 20px;
      background: rgba(25,22,20,.75);
      backdrop-filter: blur(8px);
      padding: 4px 12px;
      font-size: 10px; letter-spacing: .2em; text-transform: uppercase;
      color: var(--gold);
    }

    .room-list-body {
      padding: 36px 40px;
      display: flex; flex-direction: column; justify-content: space-between;
    }
    @media (max-width: 767px) { .room-list-body { padding: 24px; } }

    .room-list-concept {
      font-size: 10px; letter-spacing: .18em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 10px;
    }
    .room-list-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(32px, 3vw, 48px);
      font-weight: 300; line-height: 1.0;
    }
    .room-list-desc {
      margin-top: 14px;
      font-size: 14px; color: var(--ink60);
      line-height: 1.75; max-width: 440px;
    }

    .room-list-features {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-top: 20px;
    }
    .room-list-feature {
      padding: 5px 12px;
      font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
      border: 1px solid var(--ink10);
      color: var(--ink60);
      border-radius: 1px;
    }

    .room-list-bottom {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-top: 32px; padding-top: 24px;
      border-top: 1px solid var(--ink10);
      flex-wrap: wrap; gap: 16px;
    }

    .room-list-price-label {
      font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
      color: var(--ink30); margin-bottom: 4px;
    }
    .room-list-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: 40px; font-weight: 300; line-height: 1;
    }
    .room-list-price-unit {
      font-size: 12px; color: var(--ink30); margin-left: 4px;
    }

    .room-list-book {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 12px 24px;
      font-size: 11px; letter-spacing: .15em; text-transform: uppercase; font-weight: 500;
      color: var(--cream); background: var(--ink);
      text-decoration: none; border-radius: 2px;
      position: relative; overflow: hidden;
      transition: color .35s;
    }
    .room-list-book::before {
      content: ''; position: absolute; inset: 0;
      background: var(--gold);
      transform: translateX(-101%);
      transition: transform .45s cubic-bezier(.7,0,.3,1);
    }
    .room-list-book:hover::before { transform: translateX(0); }
    .room-list-book span { position: relative; z-index: 1; }

    /* ── EMPTY STATE ── */
    .rooms-empty {
      display: none;
      text-align: center;
      padding: 80px 20px;
    }
    .rooms-empty.visible { display: block; }
    .rooms-empty-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 40px; font-weight: 300; color: var(--ink30);
    }
    .rooms-empty-sub {
      margin-top: 12px; font-size: 14px; color: var(--ink30);
    }

    /* ── FOOTER ── */
    .footer {
      background: var(--ink); color: var(--cream);
      padding: 64px 0 40px;
      border-top: 1px solid rgba(244,239,230,.06);
    }
    .footer-inner {
      display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 48px;
    }
    @media (max-width: 700px) { .footer-inner { grid-template-columns: 1fr; gap: 36px; } }
    .footer-brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px; font-weight: 300; letter-spacing: .04em; margin-bottom: 12px;
    }
    .footer-brand-desc { font-size: 13px; color: rgba(244,239,230,.4); line-height: 1.7; max-width: 260px; }
    .footer-col-title { font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: rgba(244,239,230,.3); margin-bottom: 20px; }
    .footer-links { display: flex; flex-direction: column; gap: 12px; }
    .footer-link { font-size: 14px; color: rgba(244,239,230,.55); text-decoration: none; transition: color .2s; }
    .footer-link:hover { color: var(--gold); }
    .footer-bottom {
      margin-top: 56px; padding-top: 24px;
      border-top: 1px solid rgba(244,239,230,.06);
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
    }
    .footer-copy { font-size: 11px; letter-spacing: .1em; color: rgba(244,239,230,.2); text-transform: uppercase; }

    /* ── ANIMATIONS ── */
    .fade-up { opacity: 0; transform: translateY(20px); transition: opacity .6s ease, transform .6s ease; }
    .fade-up.visible { opacity: 1; transform: translateY(0); }
    </style>
  </head>
  <body
    class="font-sans bg-cream text-ink"
    data-page="rooms"
    data-header-subtitle="Rooms"
    data-header-cta-text="Book now"
    data-header-cta-href="booking.html"
  >
    <div id="siteHeader"></div>

     <!-- PAGE HERO -->
  <section class="page-hero">
    <div class="page-hero-bg">
      <img class="page-hero-bg-img"
        src="https://images.unsplash.com/photo-1522771739844-6a9f6d5f14af?auto=format&fit=crop&w=2000&q=70"
        alt="" aria-hidden="true" />
      <div class="page-hero-bg-gradient"></div>
    </div>

    <div class="page-hero-inner">
      <div class="page-hero-label">
        <span class="gold-line"></span>
        <span>Another House · Concept rooms</span>
      </div>
      <h1 class="page-hero-title">
        Our<br/><em>rooms.</em>
      </h1>
      <div class="page-hero-bottom">
        <p class="page-hero-desc">
          Each room is a different atmosphere — choose the concept that matches your mood. Minimal luxury, quiet details, modern comfort.
        </p>
        <a href="booking.html" class="page-hero-book">
          Book a room
          <svg width="14" height="10" viewBox="0 0 14 10" fill="none">
            <path d="M1 5h12M8 1l4 4-4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
      </div>
    </div>
  </section>

  <!-- FILTERS BAR -->
  <div class="filters-bar" id="filtersBar">
    <div class="filters-inner">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="romantic">Romantic</button>
      <button class="filter-btn" data-filter="sky">Sky</button>
      <button class="filter-btn" data-filter="cinema">Cinema</button>
      <button class="filter-btn" data-filter="nature">Nature</button>
      <button class="filter-btn" data-filter="minimal">Minimal</button>
      <span class="filters-count" id="filtersCount">5 rooms</span>
    </div>
  </div>

  <!-- ROOMS SECTION -->
  <section class="rooms-section">
    <div class="container">

      <!-- View toggle -->
      <div class="view-controls">
        <span class="view-label" id="viewLabel">Showing all 5 rooms</span>
        <div class="view-toggle">
          <button class="view-btn active" id="btnGrid" aria-label="Grid view" title="Grid view">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="1" y="1" width="6" height="6" stroke="currentColor" stroke-width="1.3"/>
              <rect x="9" y="1" width="6" height="6" stroke="currentColor" stroke-width="1.3"/>
              <rect x="1" y="9" width="6" height="6" stroke="currentColor" stroke-width="1.3"/>
              <rect x="9" y="9" width="6" height="6" stroke="currentColor" stroke-width="1.3"/>
            </svg>
          </button>
          <button class="view-btn" id="btnList" aria-label="List view" title="List view">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <line x1="1" y1="4" x2="15" y2="4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              <line x1="1" y1="8" x2="15" y2="8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              <line x1="1" y1="12" x2="15" y2="12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Grid -->
      <div id="roomsGrid"></div>
      <!-- List -->
      <div id="roomsList"></div>
      <!-- Empty -->
      <div class="rooms-empty" id="roomsEmpty">
        <div class="rooms-empty-title">No rooms found</div>
        <div class="rooms-empty-sub">Try a different filter.</div>
      </div>

    </div>
  </section>


    <div id="siteFooter"></div>
    <script>
      /* ── Room data ── */
      const ROOMS = [
        {
          id: "romantic",
          num: "01",
          concept: "romantic",
          name: "Romantic",
          desc: "Warm amber light, layered soft textiles, and a curated selection of scents. Designed for intimate evenings and slow mornings together.",
          features: ["King bed", "Bath", "Mood lighting", "Balcony"],
          price: "990",
          img: "https://images.unsplash.com/photo-1522771739844-6a9f6d5f14af?auto=format&fit=crop&w=1200&q=70"
        },
        {
          id: "sky",
          num: "02",
          concept: "sky",
          name: "Sky",
          desc: "An airy, cloud-like space drenched in pale blues and soft whites. Open layout, diffused natural light, and a serene lightness that clears the mind.",
          features: ["Queen bed", "Skylight", "Open bath", "City view"],
          price: "890",
          img: "https://images.unsplash.com/photo-1586023492125-27b2c045efd7?auto=format&fit=crop&w=1200&q=70"
        },
        {
          id: "cinema",
          num: "03",
          concept: "cinema",
          name: "Cinema",
          desc: "A velvet-lined cocoon built for film nights. Projector wall, bespoke audio, deep cushions, and a curated movie library to disappear into.",
          features: ["Projector", "Surround sound", "Queen bed", "Mini bar"],
          price: "1,090",
          img: "https://images.unsplash.com/photo-1558618666-fcd25c85cd64?auto=format&fit=crop&w=1200&q=70"
        },
        {
          id: "nature",
          num: "04",
          concept: "nature",
          name: "Nature",
          desc: "Raw timber, living moss walls, botanical prints and earth tones. A room that brings the outside in — grounding, still, and deeply calm.",
          features: ["King bed", "Moss wall", "Soaking tub", "Garden view"],
          price: "940",
          img: "https://images.unsplash.com/photo-1540518614846-7eded433c457?auto=format&fit=crop&w=1200&q=70"
        },
        {
          id: "minimal",
          num: "05",
          concept: "minimal",
          name: "Minimal",
          desc: "Nothing extra. Concrete, oak, linen. The design recedes so you can think clearly. Every object has a reason; everything else has been removed.",
          features: ["Queen bed", "Concrete walls", "Rain shower", "Writing desk"],
          price: "850",
          img: "https://images.unsplash.com/photo-1505693314120-0d443867891c?auto=format&fit=crop&w=1200&q=70"
        }
      ];
  
      let currentFilter = "all";
      let currentView   = "grid";
  
      function filteredRooms() {
        return currentFilter === "all" ? ROOMS : ROOMS.filter(r => r.concept === currentFilter);
      }
  
      function renderGridCard(room) {
        const el = document.createElement("a");
        el.href = `roomDetailDesktop.html?id=${room.id}`;
        el.className = "room-grid-card fade-up";
        el.innerHTML = `
          <img class="room-grid-img" src="${room.img}" alt="${room.name} room" loading="lazy"/>
          <div class="room-grid-overlay"></div>
          <div class="room-grid-body">
            <div class="room-grid-num">${room.num}</div>
            <div class="room-grid-name">${room.name}</div>
            <div class="room-grid-price"><strong>${room.price}k</strong> / night</div>
            <div class="room-grid-tags">
              ${room.features.map(f => `<span class="room-grid-tag">${f}</span>`).join("")}
            </div>
            <div class="room-grid-cta">
              Book room
              <svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4.5h10M7 1l3.5 3.5L7 8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
          </div>`;
        return el;
      }
  
      function renderListCard(room) {
        const el = document.createElement("a");
        el.href = `roomDetailDesktop.html?id=${room.id}`;
        el.className = "room-list-card fade-up";
        el.innerHTML = `
          <div class="room-list-img-wrap">
            <img class="room-list-img" src="${room.img}" alt="${room.name} room" loading="lazy"/>
            <div class="room-list-num-badge">${room.num}</div>
          </div>
          <div class="room-list-body">
            <div class="room-list-top">
              <div class="room-list-concept">Concept — ${room.concept}</div>
              <div class="room-list-name">${room.name}</div>
              <p class="room-list-desc">${room.desc}</p>
              <div class="room-list-features">
                ${room.features.map(f => `<span class="room-list-feature">${f}</span>`).join("")}
              </div>
            </div>
            <div class="room-list-bottom">
              <div class="room-list-pricing">
                <div class="room-list-price-label">From</div>
                <div class="room-list-price">${room.price}k<span class="room-list-price-unit">VND / night</span></div>
              </div>
              <div class="room-list-book"><span>Book this room</span></div>
            </div>
          </div>`;
        return el;
      }
  
      function render() {
        const rooms = filteredRooms();
        const grid  = document.getElementById("roomsGrid");
        const list  = document.getElementById("roomsList");
        const empty = document.getElementById("roomsEmpty");
        const count = document.getElementById("filtersCount");
        const label = document.getElementById("viewLabel");
  
        grid.innerHTML = "";
        list.innerHTML = "";
  
        const noun = rooms.length === 1 ? "room" : "rooms";
        const filterLabel = currentFilter === "all" ? "all" : `"${currentFilter}"`;
        count.textContent = `${rooms.length} ${noun}`;
        label.textContent = `Showing ${rooms.length} ${noun}`;
  
        if (rooms.length === 0) {
          empty.classList.add("visible");
          return;
        }
        empty.classList.remove("visible");
  
        rooms.forEach((room, i) => {
          const gc = renderGridCard(room);
          gc.style.transitionDelay = (i * 0.08) + "s";
          grid.appendChild(gc);
  
          const lc = renderListCard(room);
          lc.style.transitionDelay = (i * 0.08) + "s";
          list.appendChild(lc);
        });
  
        // trigger fade-up
        requestAnimationFrame(() => {
          document.querySelectorAll(".fade-up").forEach(el => {
            observer.observe(el);
          });
        });
      }
  
      function setView(v) {
        currentView = v;
        const grid = document.getElementById("roomsGrid");
        const list = document.getElementById("roomsList");
        const btnGrid = document.getElementById("btnGrid");
        const btnList = document.getElementById("btnList");
  
        if (v === "grid") {
          grid.classList.remove("hidden");
          list.classList.remove("active");
          btnGrid.classList.add("active");
          btnList.classList.remove("active");
        } else {
          grid.classList.add("hidden");
          list.classList.add("active");
          btnGrid.classList.remove("active");
          btnList.classList.add("active");
        }
      }
  
      // Filter buttons
      document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          currentFilter = btn.dataset.filter;
          render();
        });
      });
  
      // View toggle
      document.getElementById("btnGrid").addEventListener("click", () => setView("grid"));
      document.getElementById("btnList").addEventListener("click", () => setView("list"));
  
      // IntersectionObserver
      const observer = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add("visible"); });
      }, { threshold: 0.1 });
  
      // URL filter param
      const urlFilter = new URLSearchParams(location.search).get("concept");
      if (urlFilter) {
        const btn = document.querySelector(`[data-filter="${urlFilter}"]`);
        if (btn) {
          document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          currentFilter = urlFilter;
        }
      }
  
      render();
    </script>
    <script src="../assets/js/header.js"></script>
    <script src="../assets/js/footer.js"></script>
  </body>
</html>
